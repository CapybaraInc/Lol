<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: manipulation">
    <title>🪑 СтулоМания</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            overflow: hidden; 
            background: #0a0a1a;
            font-family: Arial, sans-serif;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        #ui-top {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        #phase-text {
            font-size: 22px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8);
        }
        #timer {
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,255,255,0.9);
        }
        #info-bottom {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 10px 20px;
            color: #fff;
            font-size: 14px;
        }
        #wins-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            pointer-events: none;
            color: #FFD700;
            font-size: 16px;
            font-weight: bold;
        }

        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 140px;
            height: 140px;
            z-index: 20;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 3px solid rgba(255,255,255,0.2);
        }
        #joystick-stick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255,200,50,0.9), rgba(255,150,0,0.7));
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255,200,0,0.5);
        }
        #sit-button {
            position: absolute;
            bottom: 60px;
            right: 30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, #FFD700, #FF8C00);
            border: 4px solid #FFA500;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #5D3A00;
            box-shadow: 0 0 30px rgba(255,200,0,0.7);
            cursor: pointer;
        }
        #sit-button.pulse {
            animation: pulse 0.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255,200,0,0.7); }
            50% { box-shadow: 0 0 60px rgba(255,255,0,1), 0 0 100px rgba(255,150,0,0.8); }
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FFD700;
            font-size: 24px;
            z-index: 100;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loading">🪑 Загрузка...</div>
    <div id="ui-top">
        <div id="phase-text">🎪 СТУЛОМАНИЯ</div>
        <div id="timer">3</div>
    </div>
    <div id="info-bottom">
        <div id="players-left">👥 10</div>
        <div id="chairs-left">🪑 9</div>
        <div id="status">Загрузка...</div>
    </div>
    <div id="wins-counter">🏆 0</div>
    <div id="joystick-zone">
        <div id="joystick-stick"></div>
    </div>
    <div id="sit-button">🪑<br>СЕСТЬ</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>

    <script>
        // Ждём загрузки Three.js
        window.addEventListener('load', function() {
            document.getElementById('loading').style.display = 'none';
            init();
        });

        // ============================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================
        let scene, camera, renderer;
        let playerData;
        let bots = [];
        let chairs = [];
        let activePlayers = [];
        let currentPhase = 'COUNTDOWN';
        let phaseTimeLeft = 3;
        let gameActive = true;
        let currentChaosMode = null;
        let chaosTimer = 0;
        let playerSeated = false;
        let wins = 0;
        let particles = [];
        let joystickVector = { x: 0, y: 0 };
        let joystickTouchId = null;
        let audioCtx = null;

        const CONFIG = {
            totalBots: 7,
            chairsCount: 7,
            arenaRadius: 14,
            phases: {
                COUNTDOWN: { name: 'Обратный отсчёт', duration: 3, color: '#4488ff' },
                RUN: { name: '🏃 БЕГ!', duration: 12, color: '#44ff44' },
                CHAOS: { name: '🔥 ХАОС!', duration: 8, color: '#ff4444' },
                FREEZE: { name: '❄️ ЗАМРИ!', duration: 3.5, color: '#ffaa00' },
            },
            chaosModes: ['dance', 'chase', 'gravity', 'swap', 'invisible'],
        };

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ (после загрузки Three.js)
        // ============================================
        function init() {
            try {
                setupThreeJS();
                createArena();
                createPlayer();
                for (let i = 0; i < CONFIG.totalBots; i++) createBot(i);
                for (let i = 0; i < CONFIG.chairsCount; i++) createChair(i);
                setupJoystick();
                
                wins = parseInt(localStorage.getItem('stulomania_wins') || '0');
                document.getElementById('wins-counter').textContent = '🏆 ' + wins;
                
                currentPhase = 'COUNTDOWN';
                phaseTimeLeft = CONFIG.phases.COUNTDOWN.duration;
                updateUI();
                
                lastTime = performance.now();
                gameLoop(lastTime);
                
                console.log('✅ СтулоМания готова!');
            } catch(e) {
                console.error('Ошибка инициализации:', e);
                document.getElementById('loading').textContent = 'Ошибка: ' + e.message;
            }
        }

        function setupThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a2e);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 80);
            camera.position.set(0, 20, 16);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x334466, 2));
            
            const sun = new THREE.DirectionalLight(0xffffff, 3);
            sun.position.set(15, 25, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 80;
            sun.shadow.camera.left = -25;
            sun.shadow.camera.right = 25;
            sun.shadow.camera.top = 25;
            sun.shadow.camera.bottom = -25;
            scene.add(sun);

            // Звёзды
            const starsGeo = new THREE.BufferGeometry();
            const starsPos = new Float32Array(1000 * 3);
            for (let i = 0; i < 1000 * 3; i += 3) {
                starsPos[i] = (Math.random() - 0.5) * 70;
                starsPos[i + 1] = Math.random() * 40 + 5;
                starsPos[i + 2] = (Math.random() - 0.5) * 70;
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
            scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ 
                color: 0xffffff, size: 0.1 
            })));
        }

        function createArena() {
            // Пол
            const floorGeo = new THREE.CylinderGeometry(CONFIG.arenaRadius, CONFIG.arenaRadius, 0.3, 64);
            const floor = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ 
                color: 0x2a1a4a, roughness: 0.3, metalness: 0.5 
            }));
            floor.position.y = -0.15;
            floor.receiveShadow = true;
            scene.add(floor);

            // Кольцо
            const ringGeo = new THREE.TorusGeometry(CONFIG.arenaRadius, 0.3, 32, 128);
            const ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({ 
                color: 0x8844ff, roughness: 0.2, emissive: 0x442288, emissiveIntensity: 1.5 
            }));
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.1;
            scene.add(ring);

            // Столбы
            for (let i = 0; i < 10; i++) {
                const angle = (i / 10) * Math.PI * 2;
                const x = Math.cos(angle) * (CONFIG.arenaRadius + 1.2);
                const z = Math.sin(angle) * (CONFIG.arenaRadius + 1.2);
                
                const pole = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.15, 0.15, 3, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff6600, emissiveIntensity: 1.2 })
                );
                pole.position.set(x, 1.5, z);
                scene.add(pole);

                const ball = new THREE.Mesh(
                    new THREE.SphereGeometry(0.35, 8, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xffaa00, emissiveIntensity: 2 })
                );
                ball.position.set(x, 3.2, z);
                scene.add(ball);
            }
        }

        function createCharacterModel(bodyColor, hatColor) {
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 1.3, 12),
                new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.4 })
            );
            body.position.y = 0.65;
            body.castShadow = true;
            group.add(body);

            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 12, 12),
                new THREE.MeshStandardMaterial({ color: 0xffccaa })
            );
            head.position.y = 1.55;
            head.castShadow = true;
            group.add(head);

            const hat = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.35, 0.3, 12),
                new THREE.MeshStandardMaterial({ color: hatColor })
            );
            hat.position.y = 1.85;
            group.add(hat);

            return group;
        }

        function createPlayer() {
            const model = createCharacterModel(0x44ff44, 0xff2222);
            model.position.set(0, 0, 0);
            scene.add(model);
            
            playerData = {
                mesh: model,
                speed: 7,
                seated: false,
                alive: true,
            };
            activePlayers.push(playerData);
        }

        function createBot(index) {
            const colors = [0xff4444, 0x4488ff, 0xff8800, 0xff44ff, 0x44ffff, 0xffff44, 0x8844ff];
            const model = createCharacterModel(colors[index % colors.length], colors[(index + 2) % colors.length]);
            
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * (CONFIG.arenaRadius - 3);
            model.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            scene.add(model);

            bots.push({
                mesh: model,
                speed: 4 + Math.random() * 3,
                seated: false,
                alive: true,
                targetAngle: Math.random() * Math.PI * 2,
                changeTimer: Math.random() * 2,
                wanderTimer: 0,
            });
            activePlayers.push(bots[bots.length - 1]);
        }

        function createChair(index) {
            const group = new THREE.Group();
            const isLucky = Math.random() < 0.15;
            const isMimic = !isLucky && Math.random() < 0.2;
            
            const seatColor = isLucky ? 0xffd700 : (isMimic ? 0x9933ff : 0xff6644);
            const seat = new THREE.Mesh(
                new THREE.BoxGeometry(1, 0.18, 1),
                new THREE.MeshStandardMaterial({ 
                    color: seatColor,
                    emissive: isLucky ? 0xffaa00 : 0x000000,
                    emissiveIntensity: isLucky ? 1.2 : 0,
                })
            );
            seat.position.y = 0.65;
            seat.castShadow = true;
            seat.receiveShadow = true;
            group.add(seat);

            const back = new THREE.Mesh(
                new THREE.BoxGeometry(1, 0.8, 0.18),
                new THREE.MeshStandardMaterial({ color: isLucky ? 0xffcc00 : 0xff5533 })
            );
            back.position.set(0, 1.05, -0.4);
            back.castShadow = true;
            group.add(back);

            // Ножки
            for (let i = 0; i < 4; i++) {
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.06, 0.06, 0.6, 6),
                    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
                );
                leg.position.set((i % 2 === 0 ? 0.35 : -0.35), 0.3, (i < 2 ? 0.35 : -0.35));
                leg.castShadow = true;
                group.add(leg);
            }

            // Глаза
            for (let s = -1; s <= 1; s += 2) {
                const eye = new THREE.Mesh(
                    new THREE.SphereGeometry(0.11, 6, 6),
                    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 })
                );
                eye.position.set(s * 0.2, 1.3, -0.3);
                group.add(eye);
            }

            const angle = (index / CONFIG.chairsCount) * Math.PI * 2;
            const radius = CONFIG.arenaRadius * 0.6;
            group.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            group.rotation.y = angle + Math.PI;
            scene.add(group);
            
            chairs.push({
                mesh: group,
                originalPosition: new THREE.Vector3(group.position.x, 0, group.position.z),
                frozen: false,
                occupied: false,
                isMimic,
                isLucky,
            });
        }

        // ============================================
        // ЧАСТИЦЫ
        // ============================================
        function spawnParticles(pos, color, count) {
            for (let i = 0; i < count; i++) {
                const p = new THREE.Mesh(
                    new THREE.SphereGeometry(0.06, 4, 4),
                    new THREE.MeshBasicMaterial({ color })
                );
                p.position.copy(pos);
                p.position.y += 1;
                p.userData = {
                    vx: (Math.random() - 0.5) * 5,
                    vy: Math.random() * 7 + 2,
                    vz: (Math.random() - 0.5) * 5,
                    life: 1.2 + Math.random(),
                };
                scene.add(p);
                particles.push(p);
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.userData.life -= dt;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                } else {
                    p.userData.vy -= 9.8 * dt;
                    p.position.x += p.userData.vx * dt;
                    p.position.y += p.userData.vy * dt;
                    p.position.z += p.userData.vz * dt;
                }
            }
        }

        // ============================================
        // ЗВУК
        // ============================================
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBeep(freq, dur) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'square';
            o.frequency.value = freq;
            g.gain.setValueAtTime(0.08, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start();
            o.stop(audioCtx.currentTime + dur);
        }

        function playWinSound() {
            [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playBeep(f, 0.3), i * 150));
        }

        // ============================================
        // ЛОГИКА
        // ============================================
        function nextPhase() {
            const phases = ['COUNTDOWN', 'RUN', 'CHAOS', 'FREEZE'];
            const idx = phases.indexOf(currentPhase);
            currentPhase = phases[(idx + 1) % phases.length];
            phaseTimeLeft = CONFIG.phases[currentPhase].duration;

            if (currentPhase === 'CHAOS') {
                currentChaosMode = CONFIG.chaosModes[Math.floor(Math.random() * CONFIG.chaosModes.length)];
                chaosTimer = 0;
                chairs.forEach(c => c.frozen = false);
            }
            if (currentPhase === 'FREEZE') {
                chairs.forEach(c => c.frozen = true);
                document.getElementById('sit-button').classList.add('pulse');
            }
            if (currentPhase === 'COUNTDOWN') {
                document.getElementById('sit-button').classList.remove('pulse');
                const alive = activePlayers.filter(p => p.alive);
                activePlayers = alive;
                bots = bots.filter(b => activePlayers.includes(b));
                chairs.forEach(c => { c.frozen = false; c.occupied = false; });
                activePlayers.forEach(p => p.seated = false);
                playerSeated = false;
            }
            updateUI();
        }

        function sitOnChair(p, chair) {
            if (chair.occupied || !chair.frozen) return;
            
            if (chair.isMimic) {
                if (p.mesh) {
                    p.mesh.position.y += 4;
                    setTimeout(() => { if (p.mesh && p.alive) p.mesh.position.y = 0; }, 500);
                    spawnParticles(p.mesh.position.clone(), 0x9933ff, 20);
                }
                playBeep(100, 0.4);
                return;
            }

            p.seated = true;
            chair.occupied = true;
            if (p.mesh) {
                p.mesh.position.copy(chair.mesh.position);
                p.mesh.position.y += 0.75;
            }
            if (p === playerData) {
                playerSeated = true;
                if (chair.isLucky) {
                    spawnParticles(chair.mesh.position.clone(), 0xffd700, 30);
                    wins++;
                    localStorage.setItem('stulomania_wins', wins);
                    document.getElementById('wins-counter').textContent = '🏆 ' + wins;
                }
            }
            playBeep(200, 0.1);
        }

        function checkSeating() {
            document.getElementById('sit-button').classList.remove('pulse');
            if (!playerData.alive) return;

            if (!playerData.seated && playerData.alive) {
                playerData.alive = false;
                playerData.mesh.position.y = -3;
                return;
            }

            activePlayers.forEach(p => {
                if (!p.seated && p.alive && p !== playerData) {
                    p.alive = false;
                    p.mesh.position.y = -3;
                }
            });

            const remaining = activePlayers.filter(p => p.alive);
            if (remaining.length <= 1 && playerData.alive) {
                wins++;
                localStorage.setItem('stulomania_wins', wins);
                document.getElementById('wins-counter').textContent = '🏆 ' + wins;
                document.getElementById('phase-text').textContent = '🏆 ПОБЕДА!';
                document.getElementById('timer').textContent = '🎉';
                spawnParticles(playerData.mesh.position.clone(), 0xffd700, 50);
                playWinSound();
                setTimeout(resetGame, 3500);
            }
        }

        function resetGame() {
            // Очистка
            const toRemove = [];
            scene.children.forEach(c => {
                if (c.geometry && (c.geometry.type === 'CylinderGeometry' || c.geometry.type === 'SphereGeometry' || c.geometry.type === 'BoxGeometry')) {
                    if (c.position.y < 10 && c !== scene.children.find(x => x === scene.children[0])) {
                        // проще пересоздать сцену
                    }
                }
            });
            
            // Пересоздаём всё
            while(scene.children.length > 0) scene.remove(scene.children[0]);
            particles = [];
            
            setupThreeJS();
            createArena();
            createPlayer();
            bots = [];
            activePlayers = [playerData];
            for (let i = 0; i < CONFIG.totalBots; i++) createBot(i);
            chairs = [];
            for (let i = 0; i < CONFIG.chairsCount; i++) createChair(i);
            
            playerSeated = false;
            currentPhase = 'COUNTDOWN';
            phaseTimeLeft = CONFIG.phases.COUNTDOWN.duration;
            document.getElementById('phase-text').textContent = '🎪 СТУЛОМАНИЯ';
            document.getElementById('timer').textContent = '3';
            updateUI();
        }

        // ============================================
        // ДЖОЙСТИК
        // ============================================
        function setupJoystick() {
            const zone = document.getElementById('joystick-zone');
            const stick = document.getElementById('joystick-stick');
            
            zone.addEventListener('touchstart', function(e) {
                e.preventDefault();
                initAudio();
                joystickTouchId = e.changedTouches[0].identifier;
            });

            zone.addEventListener('touchmove', function(e) {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickTouchId) {
                        const rect = zone.getBoundingClientRect();
                        const dx = e.changedTouches[i].clientX - rect.left - rect.width / 2;
                        const dy = e.changedTouches[i].clientY - rect.top - rect.height / 2;
                        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                        const angle = Math.atan2(dy, dx);
                        
                        stick.style.left = (rect.width/2 + Math.cos(angle)*dist - 30) + 'px';
                        stick.style.top = (rect.height/2 + Math.sin(angle)*dist - 30) + 'px';
                        
                        joystickVector.x = Math.cos(angle) * (dist/40);
                        joystickVector.y = Math.sin(angle) * (dist/40);
                    }
                }
            });

            function reset() {
                joystickTouchId = null;
                joystickVector.x = 0;
                joystickVector.y = 0;
                stick.style.left = '40px';
                stick.style.top = '40px';
            }
            zone.addEventListener('touchend', reset);
            zone.addEventListener('touchcancel', reset);

            document.getElementById('sit-button').addEventListener('touchstart', function(e) {
                e.preventDefault();
                initAudio();
                if (currentPhase === 'FREEZE' && !playerSeated && playerData.alive) {
                    let nearest = null, minDist = 99;
                    chairs.forEach(c => {
                        if (c.occupied || !c.mesh) return;
                        const d = playerData.mesh.position.distanceTo(c.mesh.position);
                        if (d < minDist) { minDist = d; nearest = c; }
                    });
                    if (nearest && minDist < 2.3) sitOnChair(playerData, nearest);
                }
            });
        }

        // ============================================
        // ОБНОВЛЕНИЕ
        // ============================================
        function findNearestChair(pos) {
            let nearest = null, minDist = 99;
            chairs.forEach(c => {
                if (c.occupied || !c.mesh) return;
                const d = pos.distanceTo(c.mesh.position);
                if (d < minDist) { minDist = d; nearest = c; }
            });
            return nearest;
        }

        function updatePlayer(dt) {
            if (!playerData.alive || playerData.seated) return;
            
            const mx = joystickVector.x;
            const mz = -joystickVector.y;
            
            if (Math.abs(mx) > 0.1 || Math.abs(mz) > 0.1) {
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                camDir.y = 0;
                camDir.normalize();
                const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), camDir).normalize();
                
                playerData.mesh.position.x += (camDir.x * mz + right.x * mx) * playerData.speed * dt;
                playerData.mesh.position.z += (camDir.z * mz + right.z * mx) * playerData.speed * dt;
                playerData.mesh.rotation.y = Math.atan2(camDir.x * mz + right.x * mx, camDir.z * mz + right.z * mx);
            }

            const dist = Math.sqrt(playerData.mesh.position.x**2 + playerData.mesh.position.z**2);
            if (dist > CONFIG.arenaRadius - 0.7) {
                const n = new THREE.Vector3(-playerData.mesh.position.x, 0, -playerData.mesh.position.z).normalize();
                playerData.mesh.position.x += n.x * 0.5;
                playerData.mesh.position.z += n.z * 0.5;
            }
        }

        function updateBots(dt) {
            bots.forEach(bot => {
                if (!bot.alive || bot.seated) return;
                
                bot.wanderTimer += dt;
                if (bot.wanderTimer > bot.changeTimer) {
                    bot.targetAngle += (Math.random() - 0.5) * Math.PI;
                    bot.changeTimer = 1 + Math.random() * 2;
                    bot.wanderTimer = 0;
                }
                
                bot.mesh.position.x += Math.sin(bot.targetAngle) * bot.speed * dt;
                bot.mesh.position.z += Math.cos(bot.targetAngle) * bot.speed * dt;
                bot.mesh.rotation.y = bot.targetAngle;

                if (currentPhase === 'FREEZE' && !bot.seated) {
                    const nc = findNearestChair(bot.mesh.position);
                    if (nc) {
                        const dx = nc.mesh.position.x - bot.mesh.position.x;
                        const dz = nc.mesh.position.z - bot.mesh.position.z;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        if (dist > 0.1) {
                            bot.mesh.position.x += (dx/dist) * 8 * dt;
                            bot.mesh.position.z += (dz/dist) * 8 * dt;
                            bot.targetAngle = Math.atan2(dx, dz);
                        }
                        if (dist < 1.3) sitOnChair(bot, nc);
                    }
                }

                const dist = Math.sqrt(bot.mesh.position.x**2 + bot.mesh.position.z**2);
                if (dist > CONFIG.arenaRadius - 0.7) {
                    const n = new THREE.Vector3(-bot.mesh.position.x, 0, -bot.mesh.position.z).normalize();
                    bot.mesh.position.x += n.x * 0.5;
                    bot.mesh.position.z += n.z * 0.5;
                    bot.targetAngle = Math.atan2(n.x, n.z);
                }
            });
        }

        function updateChaos(dt) {
            chaosTimer += dt;
            chairs.forEach((chair, i) => {
                if (!chair.mesh || chair.frozen || chair.occupied) return;
                
                switch(currentChaosMode) {
                    case 'dance':
                        chair.mesh.position.y = chair.originalPosition.y + Math.sin(chaosTimer * 14 + i) * 1;
                        chair.mesh.rotation.y += dt * 6;
                        break;
                    case 'chase':
                        let nearest = null, minD = 99;
                        activePlayers.forEach(p => {
                            if (!p.alive || p.seated) return;
                            const d = chair.mesh.position.distanceTo(p.mesh.position);
                            if (d < minD) { minD = d; nearest = p; }
                        });
                        if (nearest) {
                            const dx = nearest.mesh.position.x - chair.mesh.position.x;
                            const dz = nearest.mesh.position.z - chair.mesh.position.z;
                            chair.mesh.position.x += (dx / minD) * 5 * dt;
                            chair.mesh.position.z += (dz / minD) * 5 * dt;
                        }
                        break;
                    case 'gravity':
                        const cd = Math.sqrt(chair.mesh.position.x**2 + chair.mesh.position.z**2);
                        const f = (5 - cd) * 0.2;
                        chair.mesh.position.x += (-chair.mesh.position.x / cd) * f * Math.sin(chaosTimer*3) * dt * 8;
                        chair.mesh.position.z += (-chair.mesh.position.z / cd) * f * Math.sin(chaosTimer*3) * dt * 8;
                        chair.mesh.rotation.y += dt * 3;
                        break;
                    case 'swap':
                        if (Math.floor(chaosTimer * 0.6) % 2 === 0 && i % 2 === 0) {
                            const next = chairs[(i+1) % chairs.length];
                            if (next && next.mesh && !next.occupied) {
                                const tmp = chair.mesh.position.clone();
                                chair.mesh.position.copy(next.mesh.position);
                                next.mesh.position.copy(tmp);
                            }
                        }
                        break;
                    case 'invisible':
                        const vis = Math.sin(chaosTimer * 12 + i) > 0 ? 1 : 0.1;
                        chair.mesh.children.forEach(ch => {
                            if (ch.material && ch.material.opacity !== undefined) {
                                ch.material.transparent = true;
                                ch.material.opacity = vis;
                            }
                        });
                        break;
                }
                
                const d = Math.sqrt(chair.mesh.position.x**2 + chair.mesh.position.z**2);
                if (d > CONFIG.arenaRadius - 1) {
                    chair.mesh.position.x += (-chair.mesh.position.x / d) * 0.4;
                    chair.mesh.position.z += (-chair.mesh.position.z / d) * 0.4;
                }
            });
        }

        function updateUI() {
            const phase = CONFIG.phases[currentPhase];
            document.getElementById('phase-text').textContent = currentPhase === 'COUNTDOWN' ? '🎪 СТУЛОМАНИЯ' : phase.name;
            document.getElementById('phase-text').style.color = phase.color;
            document.getElementById('timer').textContent = Math.ceil(phaseTimeLeft);
            document.getElementById('players-left').textContent = '👥 ' + activePlayers.filter(p => p.alive).length;
            document.getElementById('chairs-left').textContent = '🪑 ' + chairs.filter(c => !c.occupied).length;
            document.getElementById('status').textContent = 'Фаза: ' + phase.name;
        }

        // ============================================
        // ГЛАВНЫЙ ЦИКЛ
        // ============================================
        let lastTime = 0;

        function gameLoop(time) {
            requestAnimationFrame(gameLoop);
            
            const dt = Math.min(0.1, (time - lastTime) / 1000);
            lastTime = time;
            
            if (!gameActive) return;
            
            phaseTimeLeft -= dt;
            if (phaseTimeLeft <= 0) {
                if (currentPhase === 'FREEZE') checkSeating();
                nextPhase();
            }
            
            updatePlayer(dt);
            updateBots(dt);
            if (currentPhase === 'CHAOS') updateChaos(dt);
            updateParticles(dt);
            
            if (playerData.alive && playerData.mesh) {
                const tp = playerData.mesh.position.clone();
                tp.y += 9;
                tp.z += 7;
                camera.position.lerp(tp, 0.08);
                camera.lookAt(playerData.mesh.position.x, 1, playerData.mesh.position.z);
            }
            
            updateUI();
            renderer.render(scene, camera);
        }

        // Обработка изменения размера окна
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('🪑 СтулоМания загружена! Версия без importmap.');
    </script>
</body>
